<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#176b5c" />
  <title>安心用药 · 家庭药品管理</title>
  <style>
    :root { --green:#176b5c; --green-2:#238471; --mint:#e8f6f0; --ink:#173832; --muted:#66817b; --line:#d9e9e4; --red:#c73535; --red-bg:#fff0f0; --gold:#ad6d0b; --card:#fff; }
    * { box-sizing:border-box; }
    body { margin:0; min-width:320px; color:var(--ink); font:17px/1.55 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; background:#f3f8f6; }
    button,input,select { font:inherit; } button { cursor:pointer; }
    .shell { max-width:760px; margin:auto; padding:18px 14px 52px; }
    header { padding:8px 5px 21px; color:white; background:linear-gradient(135deg,#155e51,#24937e); margin:-18px -14px 20px; padding:28px 20px 28px; border-radius:0 0 28px 28px; box-shadow:0 8px 22px #176b5c30; }
    .brand { display:flex; align-items:center; gap:12px; } .brand-mark { display:grid; width:48px; height:48px; place-items:center; border-radius:15px; background:#ffffff28; font-size:27px; }
    h1 { margin:0; font-size:27px; letter-spacing:.02em; } header p { margin:3px 0 0; font-size:15px; opacity:.84; }
    h2 { margin:0; font-size:21px; } .section-title { display:flex; align-items:center; justify-content:space-between; margin:28px 3px 12px; }
    .summary { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .metric { min-height:108px; padding:15px; border:1px solid #e3eeeb; border-radius:17px; background:var(--card); box-shadow:0 3px 11px #1a51470a; }
    .metric .label { color:var(--muted); font-size:14px; font-weight:600; } .metric strong { display:block; margin-top:7px; color:var(--green); font-size:24px; line-height:1.15; letter-spacing:-.03em; }
    .metric:nth-child(3) strong { color:#2773a0; } .metric:nth-child(4) strong { color:#aa6515; }
    .panel { padding:18px; border:1px solid #e2eeea; border-radius:20px; background:var(--card); box-shadow:0 3px 12px #1a51470a; }
    .lead { margin:5px 0 18px; color:var(--muted); font-size:15px; }
    .grid { display:grid; grid-template-columns:1fr; gap:14px; } .split { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    label { display:block; color:#36564f; font-size:15px; font-weight:700; } .required::after { content:" *"; color:var(--red); }
    input,select { width:100%; height:50px; margin-top:6px; padding:0 12px; color:var(--ink); border:1px solid #c8ddd7; border-radius:12px; background:#fff; font-size:17px; outline:none; }
    input:focus,select:focus { border-color:var(--green-2); box-shadow:0 0 0 3px #23847120; } .help { margin:4px 1px 0; color:var(--muted); font-size:13px; }
    .check-row { display:flex; align-items:center; min-height:51px; margin-top:6px; padding:0 12px; border:1px solid #c8ddd7; border-radius:12px; background:#f9fcfb; font-size:16px; }
    input[type="checkbox"] { width:24px; height:24px; margin:0 10px 0 0; accent-color:var(--green); }
    .save { width:100%; min-height:55px; margin-top:20px; border:0; border-radius:14px; color:#fff; background:var(--green); font-size:19px; font-weight:800; box-shadow:0 5px 12px #176b5c33; } .save:active { transform:translateY(1px); background:#105346; }
    .filters { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:13px; } .filters input { margin:0; height:46px; font-size:15px; }
    .record { position:relative; margin:10px 0; padding:16px; border:1px solid var(--line); border-radius:16px; background:#fff; } .record.near { border-color:#f2baba; background:#fffafa; }
    .record-top { display:flex; gap:9px; align-items:start; justify-content:space-between; } .drug { margin:0; font-size:20px; line-height:1.25; } .clinic { margin:4px 0 0; color:var(--muted); font-size:14px; }
    .pill { display:inline-block; flex:none; padding:3px 8px; border-radius:99px; color:#176b5c; background:var(--mint); font-size:13px; font-weight:800; } .warning { margin:12px 0 0; padding:9px 10px; border-radius:10px; color:var(--red); background:var(--red-bg); font-size:15px; font-weight:800; }
    .details { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-top:14px; padding-top:12px; border-top:1px dashed #d7e5e1; } .details div { color:var(--muted); font-size:14px; } .details b { display:block; color:var(--ink); font-size:16px; } .money { color:#a35f0d !important; }
    .record-actions { display:flex; justify-content:space-between; align-items:center; margin-top:12px; } .date-note { color:var(--muted); font-size:13px; } .delete { padding:7px 10px; border:0; border-radius:9px; color:#a04a4a; background:#fff1f1; font-size:14px; font-weight:700; }
    .empty { padding:32px 15px; color:var(--muted); text-align:center; } .empty b { display:block; margin-bottom:5px; color:#36564f; font-size:18px; }
    .notice { margin:0 0 16px; padding:11px 12px; border-radius:12px; color:#6b591d; background:#fff8dc; font-size:14px; }
    @media (min-width:560px) { .shell { padding-left:22px; padding-right:22px; } header { margin-left:-22px; margin-right:-22px; padding-left:28px; } .grid.two { grid-template-columns:1fr 1fr; } .summary { grid-template-columns:repeat(4,1fr); } .metric { min-height:117px; } .metric strong { font-size:21px; } }
  </style>
</head>
<body>
  <main class="shell">
    <header><div class="brand"><div class="brand-mark">💊</div><div><h1>安心用药</h1><p>家庭老人药品管理与开药统计</p></div></div></header>
    <section class="summary" aria-label="用药统计"><div class="metric"><span class="label">累计开药次数</span><strong id="count">0 次</strong></div><div class="metric"><span class="label">总花费金额</span><strong id="total">¥0.00</strong></div><div class="metric"><span class="label">医保累计报销</span><strong id="covered">¥0.00</strong></div><div class="metric"><span class="label">实际累计自负</span><strong id="self">¥0.00</strong></div></section>
    <div class="section-title"><h2>添加新开药记录</h2></div>
    <section class="panel"><p class="notice">金额按“单价 × 数量”的精确值计算，最后才保留两位小数，减少累计误差。</p>
      <form id="medicine-form">
        <div class="grid two"><label class="required">购买诊所 / 医院名称<input name="clinic" required maxlength="60" placeholder="例如：社区卫生服务中心" /></label><label class="required">开药日期<input name="date" type="date" required /></label></div>
        <div class="grid two"><label class="required">药品名称<input name="name" required maxlength="60" placeholder="例如：降压药" /></label><label>规格与包装<input name="spec" maxlength="80" placeholder="例如：10mg×20片/盒" /></label></div>
        <div class="grid two"><label class="required">每日用量（片 / 天）<input name="dailyDose" type="number" inputmode="decimal" min="0.001" step="0.001" required placeholder="例如：2" /></label><label class="required">总剂量（片）<input name="totalDose" type="number" inputmode="decimal" min="0.001" step="0.001" required placeholder="例如：40" /></label></div>
        <div class="grid two"><label class="required">购买数量<input name="quantity" type="number" inputmode="decimal" min="0.0001" step="0.0001" required placeholder="例如：2" /></label><label>购买单位<select name="unit"><option>盒</option><option>瓶</option><option>袋</option><option>支</option><option>片</option></select></label></div>
        <div class="grid two"><label class="required">药品单价（元 / 购买单位）<input name="price" type="text" inputmode="decimal" required placeholder="例如：36.50" /></label><label class="required">医保报销比例（%）<input name="rate" type="number" inputmode="decimal" min="0" max="100" step="0.01" required value="0" /></label></div>
        <label>医保起付线状态<span class="check-row"><input name="deductibleMet" type="checkbox" />已过起付线（勾选后按报销比例计算）</span></label>
        <button class="save" type="submit">保存开药记录</button>
      </form>
    </section>
    <div class="section-title"><h2>历史开药记录</h2></div>
    <section class="panel"><div class="filters"><input id="clinic-filter" placeholder="按诊所 / 医院筛选" /><input id="date-filter" type="date" aria-label="按开药日期筛选" /></div><div id="records"></div></section>
  </main>
  <script>
    const KEY = 'family-medicine-records-v1';
    let records = JSON.parse(localStorage.getItem(KEY) || '[]');
    const $ = selector => document.querySelector(selector);
    const esc = value => String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    const todayISO = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; };
    $('#medicine-form').date.value = todayISO();

    // 价格和数量各保留 4 位小数并转换为整数；全程用 BigInt 计算，显示时才四舍五入到分。
    function scaled(text, digits = 4) { const [whole = '0', dec = ''] = String(text).trim().replace(/,/g, '').split('.'); if (!/^\d+$/.test(whole) || !/^\d*$/.test(dec)) throw new Error('请输入有效的数字'); return BigInt(whole + (dec + '0'.repeat(digits)).slice(0, digits)); }
    function toCents(raw, scale) { return (raw + scale / 2n) / scale; }
    function yuan(cents) { return `¥${(Number(cents) / 100).toFixed(2)}`; }
    function amount(price, quantity, rate, deductibleMet) {
      const price4 = scaled(price), qty4 = scaled(quantity), rate2 = scaled(rate, 2); // 85.5% => 8550 / 10000
      const rawTotal = price4 * qty4; // 元的 8 位小数
      const totalCents = toCents(rawTotal, 1000000n);
      const coverCents = deductibleMet ? toCents(rawTotal * rate2, 10000000000n) : 0n;
      return { totalCents: String(totalCents), coverCents: String(coverCents), selfCents: String(totalCents - coverCents) };
    }
    function finishInfo(date, totalDose, dailyDose) { const days = Number(totalDose) / Number(dailyDose); const end = new Date(`${date}T12:00:00`); end.setDate(end.getDate() + Math.ceil(days)); const now = new Date(); now.setHours(0,0,0,0); const remain = Math.ceil((end - now) / 86400000); return { days, end: end.toLocaleDateString('zh-CN'), remain }; }
    function save() { localStorage.setItem(KEY, JSON.stringify(records)); }
    function renderSummary() { const sum = key => records.reduce((total, record) => total + BigInt(record[key]), 0n); $('#count').textContent = `${records.length} 次`; $('#total').textContent = yuan(sum('totalCents')); $('#covered').textContent = yuan(sum('coverCents')); $('#self').textContent = yuan(sum('selfCents')); }
    function render() {
      renderSummary(); const clinic = $('#clinic-filter').value.trim().toLowerCase(), date = $('#date-filter').value;
      const filtered = records.filter(r => (!clinic || r.clinic.toLowerCase().includes(clinic)) && (!date || r.date === date));
      $('#records').innerHTML = filtered.length ? filtered.map(r => { const info = finishInfo(r.date, r.totalDose, r.dailyDose); const near = info.remain <= 3; const warning = near ? `<p class="warning">${info.remain < 0 ? `药品已于 ${Math.abs(info.remain)} 天前吃完，请尽快补药！` : '药品即将吃完，请及时补药！'}</p>` : ''; return `<article class="record ${near ? 'near' : ''}"><div class="record-top"><div><h3 class="drug">${esc(r.name)}</h3><p class="clinic">${esc(r.clinic)} · ${r.date}</p></div><span class="pill">${info.remain < 0 ? '已吃完' : `余 ${info.remain} 天`}</span></div>${warning}<div class="details"><div>规格与包装<b>${esc(r.spec || '未填写')}</b></div><div>每日用量 / 总剂量<b>${esc(r.dailyDose)} 片 / ${esc(r.totalDose)} 片</b></div><div>购买数量 / 单价<b>${esc(r.quantity)}${esc(r.unit)} / ¥${esc(r.price)}</b></div><div>总花费<b class="money">${yuan(BigInt(r.totalCents))}</b></div><div>医保报销 / 自负<b>${yuan(BigInt(r.coverCents))} / ${yuan(BigInt(r.selfCents))}</b></div></div><div class="record-actions"><span class="date-note">预计吃完：${info.end}（约 ${Number(info.days).toFixed(1)} 天）</span><button class="delete" data-id="${r.id}">删除</button></div></article>`; }).join('') : '<div class="empty"><b>暂无开药记录</b>添加一条记录，药品用量和费用会自动统计。</div>';
    }
    $('#medicine-form').addEventListener('submit', event => { event.preventDefault(); const form = new FormData(event.currentTarget); try { const price = form.get('price'), quantity = form.get('quantity'), rate = form.get('rate'); const totalDose = form.get('totalDose'), dailyDose = form.get('dailyDose'); if (Number(totalDose) <= 0 || Number(dailyDose) <= 0 || Number(quantity) <= 0) throw new Error('用量和数量必须大于 0'); const costs = amount(price, quantity, rate, form.get('deductibleMet') === 'on'); records.unshift({ id: crypto.randomUUID(), clinic:form.get('clinic').trim(), date:form.get('date'), name:form.get('name').trim(), spec:form.get('spec').trim(), dailyDose, totalDose, quantity, unit:form.get('unit'), price, rate, deductibleMet:form.get('deductibleMet') === 'on', ...costs }); save(); event.currentTarget.reset(); event.currentTarget.date.value = todayISO(); render(); window.scrollTo({top:0,behavior:'smooth'}); } catch (error) { alert(error.message); } });
    $('#records').addEventListener('click', event => { const button = event.target.closest('.delete'); if (!button || !confirm('确定删除这条开药记录吗？')) return; records = records.filter(r => r.id !== button.dataset.id); save(); render(); });
    $('#clinic-filter').addEventListener('input', render); $('#date-filter').addEventListener('change', render); render();
  </script>
</body>
</html>
