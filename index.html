<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b5961" />
  <title>康护处方台 · 家庭药品管理</title>
  <style>
    :root{--navy:#123c4c;--teal:#087b7e;--mint:#e9f7f4;--pale:#f5faf9;--line:#d5e6e4;--ink:#17343d;--muted:#66808a;--red:#bf3d43;--amber:#a86412;--card:#fff}*{box-sizing:border-box}body{margin:0;background:var(--pale);color:var(--ink);font:17px/1.48 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}.app{max-width:840px;margin:auto;padding:0 14px 52px}header{margin:0 -14px;padding:27px 20px 24px;color:#fff;background:linear-gradient(130deg,#103f52,#087e7c);border-radius:0 0 28px 28px;box-shadow:0 7px 24px #0d56642c}.head{display:flex;justify-content:space-between;gap:10px;align-items:center}.logo{display:flex;gap:12px;align-items:center}.logo i{display:grid;place-items:center;width:49px;height:49px;border-radius:15px;background:#ffffff24;font-style:normal;font-size:27px}.logo h1{margin:0;font-size:25px;letter-spacing:.03em}.logo p{margin:2px 0 0;color:#d9f5f0;font-size:14px}.today{font-size:14px;color:#d5f2ed;text-align:right}h2{margin:0;font-size:21px}.bar{display:flex;justify-content:space-between;align-items:center;margin:25px 3px 12px}.card{padding:17px;border:1px solid #dfedea;border-radius:20px;background:var(--card);box-shadow:0 4px 14px #16454b0b}.periods{display:flex;gap:7px;overflow:auto;padding-bottom:2px}.period{flex:0 0 auto;padding:9px 12px;border:1px solid #d6e7e4;border-radius:10px;background:#fff;color:#55717a;font-size:15px;font-weight:700}.period.active{border-color:var(--teal);color:#fff;background:var(--teal)}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}.stat{padding:14px;border-radius:15px;background:#f6fbfa}.stat span{color:var(--muted);font-size:14px;font-weight:700}.stat strong{display:block;margin-top:4px;color:var(--navy);font-size:24px;letter-spacing:-.04em}.stat:nth-child(3) strong{color:#16769a}.stat:nth-child(4) strong{color:#aa6512}.notice{margin:0 0 15px;padding:10px 12px;border-radius:11px;color:#536e74;background:#eff8f6;font-size:14px}.grid{display:grid;grid-template-columns:1fr;gap:13px}.two{grid-template-columns:1fr 1fr;gap:11px}label{display:block;color:#3b5961;font-size:15px;font-weight:750}.req:after{content:' *';color:var(--red)}input,select{width:100%;height:49px;margin-top:5px;padding:0 11px;border:1px solid #c6dcd9;border-radius:11px;background:#fff;color:var(--ink);font:inherit;outline:0}input:focus,select:focus{border-color:var(--teal);box-shadow:0 0 0 3px #087b7e20}.field{position:relative}.suggestions{position:absolute;z-index:5;top:77px;left:0;right:0;display:none;max-height:245px;overflow:auto;border:1px solid #bad6d1;border-radius:12px;background:#fff;box-shadow:0 12px 25px #123c4c22}.suggestions.show{display:block}.option{display:block;width:100%;padding:11px 12px;border:0;border-bottom:1px solid #edf4f2;background:#fff;color:var(--ink);text-align:left}.option:last-child{border:0}.option b{display:block;font-size:16px}.option small{color:var(--muted);font-size:13px}.check{display:flex;align-items:center;height:49px;margin-top:5px;padding:0 11px;border:1px solid #c6dcd9;border-radius:11px;background:#fbfdfd;font-size:16px}.check input{width:24px;height:24px;margin:0 9px 0 0;accent-color:var(--teal)}.save{width:100%;height:55px;margin-top:19px;border:0;border-radius:13px;background:var(--teal);color:#fff;font-size:19px;font-weight:800;box-shadow:0 5px 12px #087b7e35}.subtle{padding:9px 11px;border:1px solid #c8dfda;border-radius:10px;color:#2b696c;background:#f5fbfa;font-size:14px;font-weight:750}.data-actions{display:flex;gap:8px;align-items:center}.filters{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}.filters input{margin:0;height:45px;font-size:15px}.record{margin:9px 0;padding:15px;border:1px solid var(--line);border-radius:16px;background:#fff}.record.urgent{border-color:#efbabc;background:#fffafa}.r-top{display:flex;justify-content:space-between;gap:7px;align-items:start}.drug{margin:0;font-size:20px;line-height:1.25}.meta{margin:3px 0 0;color:var(--muted);font-size:14px}.tag{flex:0 0 auto;padding:3px 8px;border-radius:20px;color:#08706d;background:#e4f5f0;font-size:13px;font-weight:800}.urgent .tag{color:var(--red);background:#fff0f0}.warning{margin:11px 0 0;padding:8px 10px;border-radius:9px;color:var(--red);background:#fff0f0;font-size:15px;font-weight:800}.details{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px;padding-top:11px;border-top:1px dashed #d7e5e3}.details div{color:var(--muted);font-size:13px}.details b{display:block;color:var(--ink);font-size:16px}.details .cost{color:#a26113}.r-bottom{display:flex;justify-content:space-between;align-items:center;gap:7px;margin-top:12px;color:var(--muted);font-size:13px}.delete,.edit{border:0;border-radius:9px;padding:7px 9px;font-size:14px;font-weight:700}.delete{color:#a4494d;background:#fff0f0}.edit{color:#166f72;background:#e8f7f4}.actions{display:flex;gap:7px}.danger{color:#a4494d;background:#fff0f0;border-color:#f0caca}.cancel{display:block;width:100%;margin-top:9px}.drug-table{margin-top:15px;border-top:1px solid var(--line)}.drug-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 1px;border-bottom:1px solid #e5eeec}.drug-row b{display:block;font-size:16px}.drug-row span{display:block;color:var(--muted);font-size:13px}.rank{margin:0;padding:0;list-style:none}.rank li{display:flex;justify-content:space-between;gap:8px;padding:12px 2px;border-bottom:1px solid #e7efed}.rank li:last-child{border:0}.rank b{font-size:17px}.rank span{color:var(--muted);font-size:14px;text-align:right}.empty{padding:26px 8px;color:var(--muted);text-align:center}.empty b{display:block;color:#45616a;font-size:18px}.footnote{margin:11px 2px 0;color:var(--muted);font-size:13px}@media(min-width:600px){.app{padding:0 24px 56px}header{margin:0 -24px;padding-left:29px;padding-right:29px}.grid.desktop-two{grid-template-columns:1fr 1fr}.stats{grid-template-columns:repeat(4,1fr)}.stat{min-height:112px}.stat strong{font-size:21px}}
  </style>
</head>
<body>
<main class="app">
  <header><div class="head"><div class="logo"><i>⚕</i><div><h1>康护处方台</h1><p>专业家庭药品管理与医保报销统计</p></div></div><div class="today" id="today"></div></div></header>
  <section class="bar"><h2>开药仪表盘</h2><button class="subtle danger" id="clear-all" type="button">清空所有数据</button></section>
  <section class="card"><div class="periods" aria-label="统计时间范围"><button class="period active" data-range="30">近 1 个月</button><button class="period" data-range="90">近 3 个月</button><button class="period" data-range="365">近 1 年</button><button class="period" data-range="all">全部历史</button></div><div class="stats"><div class="stat"><span>开药次数</span><strong id="s-count">0 次</strong></div><div class="stat"><span>总花费金额</span><strong id="s-total">¥0.00</strong></div><div class="stat"><span>医保报销总额</span><strong id="s-cover">¥0.00</strong></div><div class="stat"><span>实际自负总额</span><strong id="s-self">¥0.00</strong></div></div></section>
  <section class="bar"><h2>医生开药录入</h2><div class="data-actions"><button class="subtle" id="load-demo" type="button">预载 Excel 历史数据</button></div></section>
  <section class="card"><p class="notice">输入药品名称即可从底表模糊检索；选中后会自动带出默认单价、医保类别和单盒天数，均可手动调整。</p><form id="form"><div class="grid desktop-two"><label class="req">诊所 / 医院<input name="clinic" required maxlength="50" placeholder="例如：市人民医院" /></label><label class="req">开药日期<input name="date" type="date" required /></label></div><div class="grid desktop-two"><label class="req field">药品名称<input id="name" name="name" required autocomplete="off" placeholder="输入药品名称搜索…" /><div id="suggestions" class="suggestions"></div></label><label>医保类别<select name="category"><option>甲类</option><option selected>乙类10%</option><option>乙类20%</option></select></label></div><div class="grid desktop-two"><label class="req">单价（元 / 盒）<input name="price" type="text" inputmode="decimal" required placeholder="自动带入，可修改" /></label><label class="req">单盒可吃天数<input name="boxDays" type="number" inputmode="decimal" min="0.01" step="0.01" required placeholder="自动带入，可修改" /></label></div><div class="grid desktop-two"><label class="req">购买数量（盒）<input name="quantity" type="number" inputmode="decimal" min="0.0001" step="0.0001" required value="1" /></label><label>是否已过医保起付线<span class="check"><input name="deductible" type="checkbox" />已过起付线，按医保类别计算</span></label></div><button class="save" id="save-record" type="submit">保存本次开药记录</button><button class="subtle cancel" id="cancel-edit" type="button" hidden>取消编辑，重新录入</button></form></section>
  <section class="bar"><h2>购买排行榜</h2></section><section class="card"><ol id="ranking" class="rank"></ol></section>
  <section class="bar"><h2>历史开药记录</h2></section><section class="card"><div class="filters"><input id="filter-clinic" placeholder="按诊所 / 医院筛选" /><input id="filter-date" type="date" aria-label="按开药日期筛选" /></div><div id="records"></div></section><section class="bar"><h2>药品底表维护</h2></section><section class="card"><p class="notice">可以新增、编辑或删除预设药品；改动会保存到本机，并用于下次开药时的联想搜索。</p><form id="drug-form"><input id="drug-id" type="hidden" /><div class="grid desktop-two"><label class="req">药品名称<input id="drug-name" required maxlength="80" placeholder="例如：盐酸二甲双胍缓释片" /></label><label class="req">单价（元 / 盒）<input id="drug-price" required inputmode="decimal" placeholder="例如：31.64" /></label></div><div class="grid desktop-two"><label>医保类别<select id="drug-category"><option>甲类</option><option selected>乙类10%</option><option>乙类20%</option></select></label><label class="req">单盒可吃天数<input id="drug-days" type="number" required min="0.01" step="0.01" inputmode="decimal" placeholder="例如：7.5" /></label></div><button class="subtle" type="submit">保存药品到底表</button></form><div id="drug-table" class="drug-table"></div></section><p class="footnote">本页所有记录仅存于当前浏览器的本地存储。金额以固定精度计算，最终显示时才保留两位小数。</p>
</main>
<script>
const DB=[
['盐酸二甲双胍缓释片（格华止）','31.64','乙类10%','7.5'],['利伐沙班（拜瑞妥）','96.6','乙类20%','5'],['厄贝沙坦片（安博维）','22.24','乙类10%','3.5'],['酒石酸美托洛尔（倍他乐克）','6.05','乙类10%','10'],['阿托伐他汀钙片（立普妥）','38.49','乙类10%','7'],['硫酸氢氯吡格雷片（波立维）','24.8','甲类','7'],['培哚普利叔丁胺片（雅施达）','80.66','乙类10%','15'],['百令胶囊','70.66','乙类10%','5.83'],['苯溴马隆胶囊','27.4','甲类','6'],['格列吡嗪控释片（乐透福）','24.81','甲类','10.5'],['复方酚咖伪麻胶囊（力比得）','38.16','甲类','3.5'],['复方银花解毒颗粒','49.98','乙类10%','4'],['双歧杆菌三联活菌胶囊（培菲康）','23.99','乙类10%','9'],['硫酸氢氯吡格雷片（连泰）','13.64','甲类','14'],['苯溴马隆片（尔同舒）','50.43','甲类','28'],['百令片（圣傲）','66.25','乙类10%','15']
].map(([name,price,category,boxDays])=>({name,price,category,boxDays}));
const KEY='kanghu-prescription-records-v2', DRUG_KEY='kanghu-drug-database-v1', $=s=>document.querySelector(s); let records=JSON.parse(localStorage.getItem(KEY)||'[]'), drugDB=JSON.parse(localStorage.getItem(DRUG_KEY)||'null')||DB.map(x=>({...x,id:crypto.randomUUID()})), range='30', editingId=null;
const localDate=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}; const escapeHTML=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
$('#today').textContent=new Intl.DateTimeFormat('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'short'}).format(new Date()); $('#form').date.value=localDate();
function scaled(value,digits=4){const [a='0',b='']=String(value).trim().replace(/,/g,'').split('.');if(!/^\d+$/.test(a)||!/^\d*$/.test(b))throw Error('请填写有效数字');return BigInt(a+(b+'0'.repeat(digits)).slice(0,digits))} function cents(raw,scale){return(raw+scale/2n)/scale} function money(value){return `¥${(Number(value)/100).toFixed(2)}`} function calc(price,quantity,category,deductible){const raw=scaled(price)*scaled(quantity);const total=cents(raw,1000000n);const rates={'甲类':1000n,'乙类10%':1900n,'乙类20%':2800n};const self=deductible?cents(raw*rates[category],10000000000n):total;return{totalCents:String(total),selfCents:String(self),coverCents:String(total-self)}}
function endInfo(r){const days=Number(r.boxDays)*Number(r.quantity),end=new Date(`${r.date}T12:00:00`);end.setDate(end.getDate()+Math.ceil(days));const now=new Date();now.setHours(0,0,0,0);return{days,end:end.toLocaleDateString('zh-CN'),left:Math.ceil((end-now)/86400000)}} function save(){localStorage.setItem(KEY,JSON.stringify(records))} function inRange(r){if(range==='all')return true;const start=new Date();start.setHours(0,0,0,0);start.setDate(start.getDate()-Number(range));return new Date(`${r.date}T12:00:00`)>=start} function chosen(){return records.filter(inRange)}
function renderDashboard(){const rows=chosen(),sum=k=>rows.reduce((n,r)=>n+BigInt(r[k]),0n);$('#s-count').textContent=`${rows.length} 次`;$('#s-total').textContent=money(sum('totalCents'));$('#s-cover').textContent=money(sum('coverCents'));$('#s-self').textContent=money(sum('selfCents'));const grouped=new Map();rows.forEach(r=>{const v=grouped.get(r.name)||{qty:0,cents:0n};v.qty+=Number(r.quantity);v.cents+=BigInt(r.totalCents);grouped.set(r.name,v)});const ranks=[...grouped.entries()].sort((a,b)=>b[1].cents>a[1].cents?1:-1);$('#ranking').innerHTML=ranks.length?ranks.map(([name,v],i)=>`<li><b>${i+1}. ${escapeHTML(name)}</b><span>${v.qty} 盒<br>${money(v.cents)}</span></li>`).join(''):'<li class="empty"><b>该时间段暂无数据</b>添加记录后会生成药品购买排行。</li>'}
function renderRecords(){const clinic=$('#filter-clinic').value.trim().toLowerCase(),date=$('#filter-date').value,rows=chosen().filter(r=>(!clinic||r.clinic.toLowerCase().includes(clinic))&&(!date||r.date===date));$('#records').innerHTML=rows.length?rows.map(r=>{const info=endInfo(r),urgent=info.left<=3;return `<article class="record ${urgent?'urgent':''}"><div class="r-top"><div><h3 class="drug">${escapeHTML(r.name)}</h3><p class="meta">${escapeHTML(r.clinic)} · ${r.date} · ${r.category}</p></div><span class="tag">${info.left<0?'已断药':`余 ${info.left} 天`}</span></div>${urgent?`<p class="warning">⚠️ ${info.left<0?`已断药 ${Math.abs(info.left)} 天，请尽快购药`:'尽快购药'}</p>`:'<p class="meta" style="margin-top:10px">✅ 药量充足</p>'}<div class="details"><div>单价 × 数量<b>¥${escapeHTML(r.price)} × ${escapeHTML(r.quantity)} 盒</b></div><div>单盒天数 / 可吃天数<b>${escapeHTML(r.boxDays)} 天 / ${info.days.toFixed(2)} 天</b></div><div>总原价<b class="cost">${money(BigInt(r.totalCents))}</b></div><div>医保报销 / 实际自负<b>${money(BigInt(r.coverCents))} / ${money(BigInt(r.selfCents))}</b></div></div><div class="r-bottom"><span>预计断药：${info.end}</span><div class="actions"><button class="edit" data-id="${r.id}">编辑</button><button class="delete" data-id="${r.id}">删除</button></div></div></article>`}).join(''):'<div class="empty"><b>暂无符合条件的记录</b>可以新增记录或切换统计时间范围。</div>'} function renderDrugTable(){ $('#drug-table').innerHTML=drugDB.map(d=>`<div class="drug-row"><div><b>${escapeHTML(d.name)}</b><span>¥${escapeHTML(d.price)} / 盒 · ${d.category} · ${d.boxDays} 天 / 盒</span></div><div class="actions"><button class="edit" data-drug="${d.id}">编辑</button><button class="delete" data-drug="${d.id}">删除</button></div></div>`).join('')||'<div class="empty">药品底表为空，请添加药品。</div>'} function render(){renderDashboard();renderRecords();renderDrugTable()}
const nameInput=$('#name'),suggest=$('#suggestions');function showSuggestions(){const q=nameInput.value.trim().toLowerCase(),matches=drugDB.filter(x=>x.name.toLowerCase().includes(q)).slice(0,8);suggest.innerHTML=matches.map(x=>`<button type="button" class="option" data-id="${x.id}"><b>${escapeHTML(x.name)}</b><small>¥${x.price} / 盒 · ${x.category} · ${x.boxDays} 天 / 盒</small></button>`).join('');suggest.classList.toggle('show',matches.length>0)}nameInput.addEventListener('input',showSuggestions);nameInput.addEventListener('focus',showSuggestions);suggest.addEventListener('click',e=>{const b=e.target.closest('.option');if(!b)return;const x=drugDB.find(item=>item.id===b.dataset.id),f=$('#form');if(!x)return;nameInput.value=x.name;f.price.value=x.price;f.category.value=x.category;f.boxDays.value=x.boxDays;suggest.classList.remove('show')});document.addEventListener('click',e=>{if(!e.target.closest('.field'))suggest.classList.remove('show')});
function resetRecordForm(){editingId=null;$('#form').reset();$('#form').date.value=localDate();$('#save-record').textContent='保存本次开药记录';$('#cancel-edit').hidden=true}function editRecord(id){const r=records.find(x=>x.id===id);if(!r)return;editingId=id;const f=$('#form');f.clinic.value=r.clinic;f.date.value=r.date;f.name.value=r.name;f.price.value=r.price;f.category.value=r.category;f.boxDays.value=r.boxDays;f.quantity.value=r.quantity;f.deductible.checked=r.deductible;$('#save-record').textContent='保存修改';$('#cancel-edit').hidden=false;f.scrollIntoView({behavior:'smooth',block:'start'});f.clinic.focus()}$('#form').addEventListener('submit',e=>{e.preventDefault();const d=new FormData(e.currentTarget);try{if(Number(d.get('quantity'))<=0||Number(d.get('boxDays'))<=0)throw Error('购买数量和单盒天数必须大于 0');const result=calc(d.get('price'),d.get('quantity'),d.get('category'),d.get('deductible')==='on');const next={id:editingId||crypto.randomUUID(),clinic:d.get('clinic').trim(),date:d.get('date'),name:d.get('name').trim(),price:d.get('price'),category:d.get('category'),boxDays:d.get('boxDays'),quantity:d.get('quantity'),deductible:d.get('deductible')==='on',...result};records=editingId?records.map(r=>r.id===editingId?{...r,...next}:r):[next,...records];save();resetRecordForm();render();window.scrollTo({top:0,behavior:'smooth'})}catch(err){alert(err.message)}});$('#cancel-edit').addEventListener('click',resetRecordForm);
document.querySelector('.periods').addEventListener('click',e=>{const b=e.target.closest('.period');if(!b)return;range=b.dataset.range;document.querySelectorAll('.period').forEach(x=>x.classList.toggle('active',x===b));render()});$('#filter-clinic').addEventListener('input',renderRecords);$('#filter-date').addEventListener('change',renderRecords);$('#records').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;if(b.classList.contains('edit'))return editRecord(b.dataset.id);if(b.classList.contains('delete')&&confirm('确定删除这条开药记录吗？此操作无法撤销。')){records=records.filter(r=>r.id!==b.dataset.id);if(editingId===b.dataset.id)resetRecordForm();save();render()}});$('#clear-all').addEventListener('click',()=>{if(!confirm('确定清空所有开药记录吗？这会删除所有历史与预载数据，且无法恢复。'))return;records=[];save();resetRecordForm();render()});
$('#load-demo').addEventListener('click',()=>{if(records.some(r=>r.seedSource==='demo'))return alert('23 条预载示例记录已经存在，无需重复导入。');if(records.length&&!confirm('预载会保留现有记录，并额外写入 23 条示例历史记录。确定继续吗？'))return;const offsets=[2,6,11,16,22,28,35,43,51,60,70,81,94,108,124,142,160,181,205,232,263,299,335],demo=offsets.map((offset,i)=>{const med=DB[i%DB.length],date=new Date();date.setDate(date.getDate()-offset);const qty=[1,2,2,3][i%4],deductible=i%5!==0,price=med.price,result=calc(price,String(qty),med.category,deductible);return{id:crypto.randomUUID(),seedSource:'demo',clinic:['市人民医院','社区卫生服务中心','康宁诊所'][i%3],date:`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`,name:med.name,price,category:med.category,boxDays:med.boxDays,quantity:String(qty),deductible,...result}});records=[...demo,...records];save();render();alert('已预载 23 条可编辑的示例历史记录。若有原始 Excel 明细，可删除示例后按真实数据录入。')});render();
</script>
<script>
  function saveDrugDB(){ localStorage.setItem(DRUG_KEY, JSON.stringify(drugDB)); }
  function resetDrugForm(){ $('#drug-form').reset(); $('#drug-id').value=''; }
  $('#drug-form').addEventListener('submit', event => {
    event.preventDefault();
    const id=$('#drug-id').value, next={id:id||crypto.randomUUID(),name:$('#drug-name').value.trim(),price:$('#drug-price').value.trim(),category:$('#drug-category').value,boxDays:$('#drug-days').value};
    try { scaled(next.price); if(Number(next.boxDays)<=0) throw Error('单盒可吃天数必须大于 0'); drugDB=id?drugDB.map(d=>d.id===id?next:d):[...drugDB,next]; saveDrugDB(); resetDrugForm(); render(); } catch(error) { alert(error.message); }
  });
  $('#drug-table').addEventListener('click', event => {
    const button=event.target.closest('button'), id=button?.dataset.drug; if(!id) return;
    const drug=drugDB.find(item=>item.id===id); if(!drug) return;
    if(button.classList.contains('edit')) { $('#drug-id').value=drug.id; $('#drug-name').value=drug.name; $('#drug-price').value=drug.price; $('#drug-category').value=drug.category; $('#drug-days').value=drug.boxDays; $('#drug-form').scrollIntoView({behavior:'smooth',block:'center'}); return; }
    if(button.classList.contains('delete') && confirm(`确定从药品底表删除“${drug.name}”吗？历史开药记录不会被删除。`)) { drugDB=drugDB.filter(item=>item.id!==id); saveDrugDB(); render(); }
  });
</script>
